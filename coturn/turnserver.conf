# Coturn TURN server — inside AWS VPC for ORF corp access via site-to-site VPN
#
# Browser (10.138.x.x) --TCP--> coturn (10.84.17.28:3478) --UDP(local)--> webrtc-rs

# Listen on VPC interface
listening-ip=0.0.0.0
listening-port=3478

# Relay address (VPC private IP)
relay-ip=10.84.17.28
external-ip=10.84.17.28

# Realm
realm=parakeet.local

# Shared secret auth (RFC 5389 ephemeral credentials)
use-auth-secret
static-auth-secret=fbd2161186678046767cf2709c0a6ffe6dfca89b8983ef100e53cb89f8f9fa58

# Relay port range
min-port=10000
max-port=13000

# Logging
log-file=stdout
verbose

# Security
no-multicast-peers
no-cli
fingerprint
stale-nonce=600
